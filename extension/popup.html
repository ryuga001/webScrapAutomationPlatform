<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 320px;
        margin: 0;
        padding: 14px;
        font: 14px system-ui, sans-serif;
        background: #0f172a;
        color: #e5f5ff;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 15px;
        color: #22d3ee;
      }
      label {
        display: block;
        font-size: 12px;
        color: #94a3b8;
        margin-bottom: 4px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 7px 9px;
        border: 1px solid #334155;
        border-radius: 8px;
        background: #020617;
        color: #e5f5ff;
        outline: none;
      }
      input:focus {
        border-color: #22d3ee;
      }
      .row {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }
      button {
        flex: 1;
        padding: 8px;
        border: 0;
        border-radius: 8px;
        font-weight: 700;
        cursor: pointer;
      }
      #scrape {
        background: #22d3ee;
        color: #0f172a;
      }
      #download {
        background: transparent;
        color: #e5f5ff;
        border: 1px solid #475569;
      }
      #count {
        margin: 10px 0 6px;
        font-size: 12px;
        color: #94a3b8;
      }
      #results {
        max-height: 220px;
        overflow: auto;
        border: 1px solid #1e293b;
        border-radius: 8px;
        padding: 6px;
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <h1>WebBot Scraper</h1>
    <label for="selector">CSS selector</label>
    <input id="selector" value="a" placeholder="e.g. .person .name, h1, a" />
    <div class="row">
      <button id="scrape">Scrape page</button>
      <button id="download">Download .txt</button>
    </div>
    <div id="count"></div>
    <div id="results"></div>
    <script src="popup.js"></script>
  </body>
</html>
